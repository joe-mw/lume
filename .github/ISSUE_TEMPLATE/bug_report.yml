name: 🐞 Bug report
description: Report something that isn't working as expected.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections below.

        ⚠️ **Do not include real provider credentials, playlist URLs, or stream links.**
        Lume is a player only — never paste content you are not entitled to share.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched [existing issues](https://github.com/bilipp/Lume/issues) and didn't find a duplicate.
          required: true
        - label: I'm running the latest version from `main`.
          required: false
        - label: My report contains no credentials, playlist URLs, or stream links.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to '…'
        2. Tap on '…'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where does this happen? (Select all that apply.)
      multiple: true
      options:
        - iOS / iPadOS
        - macOS
        - tvOS
        - visionOS
    validations:
      required: true
  - type: dropdown
    id: engine
    attributes:
      label: Playback engine
      description: Only relevant for playback bugs.
      options:
        - "Not playback-related"
        - KSPlayer
        - VLCKit
        - AVPlayer
        - External player (Infuse / VLC)
        - "Multiple / not sure"
    validations:
      required: false
  - type: dropdown
    id: playlist-type
    attributes:
      label: Playlist type
      description: Only relevant for catalog/sync/login bugs.
      options:
        - "Not applicable"
        - Xtream Codes
        - M3U / M3U8 (URL)
        - M3U / M3U8 (local file)
    validations:
      required: false
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "e.g. iOS 26.4, macOS 26.4, tvOS 26.4"
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g. iPhone 17 Pro, Apple TV 4K (3rd gen), MacBook Pro M3"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or recordings
      description: |
        Attach anything that helps — crash logs, console output, screenshots, or a screen recording.
        Remember to redact any credentials or stream URLs first.
    validations:
      required: false
