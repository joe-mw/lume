name: Sideload Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build Sideload IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app

      # ── Code signing ────────────────────────────────────────────────────────
      # Requires three repository secrets:
      #   BUILD_CERTIFICATE_BASE64  — base64-encoded .p12 (development cert + key)
      #   P12_PASSWORD              — password for the .p12
      #   KEYCHAIN_PASSWORD         — an ephemeral password for the temp keychain
      # Export your certificate from Keychain Access → Export as .p12, then:
      #   base64 -i certificate.p12 | pbcopy
      - name: Import certificate into keychain
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # Requires one more secret:
      #   PROVISIONING_PROFILE_BASE64 — base64-encoded .mobileprovision (ad-hoc)
      # base64 -i Lume_AdHoc.mobileprovision | pbcopy
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/Lume_Sideload.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── Inject .env secrets (optional) ──────────────────────────────────────
      # If you store API keys as repository secrets, write them to .env so
      # Scripts/inject-env.sh picks them up. Leave secrets empty to skip.
      - name: Write .env
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: |
          {
            [ -n "$TMDB_API_KEY" ] && echo "TMDB_API_KEY=$TMDB_API_KEY"
            [ -n "$OMDB_API_KEY" ] && echo "OMDB_API_KEY=$OMDB_API_KEY"
          } > .env || true

      # ── Archive ─────────────────────────────────────────────────────────────
      - name: Archive (Sideload)
        run: |
          xcodebuild archive \
            -project Lume.xcodeproj \
            -scheme Lume \
            -configuration Sideload \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Lume-Sideload.xcarchive" \
            | xcbeautify --quiet || cat /tmp/xcodebuild.log

      # ── Export IPA ──────────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>compileBitcode</key>
            <false/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Lume-Sideload.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      # ── Rename with version tag ──────────────────────────────────────────────
      - name: Rename IPA
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          mv "$RUNNER_TEMP/export/Lume.ipa" \
             "$RUNNER_TEMP/Lume-${VERSION}-Sideload.ipa"

      # ── Attach to release ────────────────────────────────────────────────────
      - name: Upload IPA to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/Lume-${{ github.event.release.tag_name }}-Sideload.ipa

      # ── Cleanup ─────────────────────────────────────────────────────────────
      - name: Remove keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
