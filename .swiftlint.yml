disabled_rules:
  # Disabled because swiftformat enforces the opposite (consistent trailing commas).
  - trailing_comma

line_length:
  warning: 200
  error: 300
  ignores_urls: true
  ignores_function_declarations: true

file_length:
  warning: 600
  error: 800

type_body_length:
  warning: 400
  error: 500